name: Backend CI / Deploy to Fly

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Build backend
        run: npm run build

      - name: Test DB connectivity and run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          apt-get update && apt-get install -y netcat
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set; skipping migrations/seed"
            exit 0
          fi

          # extract host and port for quick TCP check
          DB_HOST=$(echo "$DATABASE_URL" | sed -E 's#.*@([^:/]+)(:([0-9]+))?/.*#\1#')
          DB_PORT=$(echo "$DATABASE_URL" | sed -E 's#.*@[^:/]+:([0-9]+)/.*#\1#')
          if [ -z "$DB_PORT" ]; then DB_PORT=5432; fi

          echo "Checking TCP connectivity to $DB_HOST:$DB_PORT"
          if nc -zv "$DB_HOST" "$DB_PORT"; then
            echo "DB reachable — running migrations"
            echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
            npx prisma migrate deploy --schema=prisma/schema.prisma
            npm run seed || true
          else
            echo "DB unreachable at $DB_HOST:$DB_PORT — skipping migrations/seed"
          fi

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          $HOME/.fly/bin/flyctl version
        shell: bash

      - name: Flyctl debug (auth + apps)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl version
          flyctl auth whoami || true
          flyctl apps list || true
        shell: bash

      - name: Flyctl debug (verify token and app)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl version
          flyctl auth whoami || true
          flyctl apps list || true
          flyctl info ${{ secrets.FLY_APP_NAME }} || flyctl status --app ${{ secrets.FLY_APP_NAME }} || true
        shell: bash

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          set -o pipefail
          flyctl deploy --config fly.toml --app ${{ secrets.FLY_APP_NAME }} || echo "DEPLOY_FAILED=1" >> $GITHUB_ENV
        shell: bash

      - name: Dump Fly logs on failure
        if: env.DEPLOY_FAILED == '1'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          echo "Deploy failed — fetching recent logs for debugging"
          flyctl logs --app ${{ secrets.FLY_APP_NAME }} --no-tail || true
          # Exit non-zero so the job still fails after printing logs
          exit 1
        shell: bash
