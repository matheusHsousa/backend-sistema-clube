name: Backend CI / Deploy to Fly

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        env:
          PRISMA_CLIENT_ENGINE_TYPE: dataproxy
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run prisma:generate

      - name: Build backend
        env:
          PRISMA_CLIENT_ENGINE_TYPE: dataproxy
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build

      - name: Test DB connectivity and run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          apt-get update && apt-get install -y netcat
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set; skipping migrations/seed"
            exit 0
          fi

          # extract host and port for quick TCP check
          DB_HOST=$(echo "$DATABASE_URL" | sed -E 's#.*@([^:/]+)(:([0-9]+))?/.*#\1#')
          DB_PORT=$(echo "$DATABASE_URL" | sed -E 's#.*@[^:/]+:([0-9]+)/.*#\1#')
          if [ -z "$DB_PORT" ]; then DB_PORT=5432; fi

          echo "Checking TCP connectivity to $DB_HOST:$DB_PORT"
          if nc -zv "$DB_HOST" "$DB_PORT"; then
            echo "DB reachable — running migrations"
            echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccountKey.json
            npx prisma migrate deploy --schema=prisma/schema.prisma
            npm run seed || true
          else
            echo "DB unreachable at $DB_HOST:$DB_PORT — skipping migrations/seed"
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel

      - name: Vercel deploy (via action)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: '--prod --confirm'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_CLIENT_ENGINE_TYPE: dataproxy

      - name: Dump Vercel logs on failure
        if: failure()
        run: |
          echo "Deploy failed — fetching recent logs for debugging"
          npm install -g vercel
          vercel logs --token ${{ secrets.VERCEL_TOKEN }} --limit 100 || true
